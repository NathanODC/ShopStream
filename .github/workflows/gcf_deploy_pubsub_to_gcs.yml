name: Build and Deploy to GCF Pubsub to GCS

on:
  push:
    branches: [ "main" ]
    paths:
      - "shopstream/2_pubsub-2-gcs/**"

env:
  FUNCTION_NAME: gcf-pubsub-2-gcs
  SOURCE_DIR: shopstream/2_pubsub-2-gcs
  REGION: us-central1
  PYTHON_VERSION: python313
  ENTRY_POINT: main
  SERVICE_ACCOUNT: ${{ secrets.GCF_SERVICE_ACCOUNT }}

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest
    environment: Production

    permissions:
      contents: 'read'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: update gcf pubsub to gcs
      run: |-
        set -e
        echo "Deploying Function: ${{ env.FUNCTION_NAME }}"
        gcloud run deploy ${{ env.FUNCTION_NAME }} \
          --no-allow-unauthenticated \
          --region ${{ env.REGION }} \
          --base-image ${{ env.PYTHON_VERSION }} \
          --function ${{ env.ENTRY_POINT }} \
          --source $GITHUB_WORKSPACE/${{ env.SOURCE_DIR }} \
          --service-account=${{ env.SERVICE_ACCOUNT }}
